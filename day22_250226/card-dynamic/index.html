<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cards-Dynamic</title>
</head>
<body>
    <div id="drinks-section">
        <h1>DRINKS</h1>
        <div id="drinks">
            <div class="drink">
                <div id="drink-image">
                    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93" alt="">
                </div>
                <div id="drink-content">
                    <h2>Classic Cappucino <span>(450ml)</span></h2>
                    
                    <p>Rich espresso blended with steamed milk and thick milk foam. Perfect balance of bold and creamy.</p>
                    <span>Size: S M L</span>
                </div>
                <div id="buyout">
                    <span id="discounted-price">$9.95</span>
                    <span id="actual-price">$10.96</span>

                    <button id="order">Order Now</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
