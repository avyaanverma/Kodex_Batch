<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div id="main">
        <div id="container">
            <div id="title">
                <h1>DOOM CLOCK</h1>
                <p>This clock will run till the eternity</p>
            </div>

            <div id="clock-container">
                <img id="clock-image" src="./clock.png" alt="Clock Image">
                <div id="secHands"></div>
                <div id="minHands"></div>
                <div id="hourHands"></div>
            </div>

            <h2>
                <span id="hours">00</span> Hours
                <span id="minutes">00</span> Minutes
                <span id="seconds">00</span> Seconds
            </h2>
        </div>
    </div>
</body>
</html>
