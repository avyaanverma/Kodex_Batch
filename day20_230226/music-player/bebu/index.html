<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>Music-Player</title>
</head>
<body>
    <div id="main">
        <div id="music-player">
            <div id="player">
                <div id="song">
                    <div id="song-image">
                        <i class="ri-poker-hearts-line"></i>
                        <div id="inner"></div>
                        <!-- <i class="ri-poker-hearts-fill liked"></i> -->
                        <img src="./assets/pehli-dafa.jpeg" alt="">
                    </div>
                    <div id="song-name">PEHLI DAFA</div>
                    <div id="song-author">Happy 11 Months Bebu💗</div>
                </div>
                <div id="media-controls">
                    <div id="progress-bar">
                        <div id="completed"></div>
                    </div>

                    <div id="controls">
                        <div id="prev"><i class="ri-skip-back-fill"></i></div>
                        <div id="pause"><i class="ri-pause-circle-fill"></i></div>
                        <div id="next"><i class="ri-skip-right-fill"></i></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
