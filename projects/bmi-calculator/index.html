<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BMI Calculator</title>
</head>
<body>
    <main>
        <div id="box">
            <form action="" id="calculator-form">
                <h1>BMI Calculator</h1>
                <div>
                    <label for="Age">Age</label>
                    <input type="number" placeholder="yrs">
                </div>
                <div>
                    <label for="Gender">Gender</label>
                    <select type="text" placeholder="Select your Gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div>
                    <label for="Height">Height</label>
                    <input type="number" id="height" placeholder="in cm">
                </div>
                <div>
                    <label for="Weight" >Weight</label>
                    <input type="number" id="weight" placeholder="in kg">
                </div>
    
                <button  id="submit-btn">Submit</button>
            </form>
            <div id="result">
                
            </div>
        </div>


    </main>
    <script src="./script.js"></script>
</body>
</html>
