<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <nav>
            <h1>E-commerce</h1>
            <div class="links">
                <p>Home</p>
                <p>Products</p>
                <p>Carts</p>
            </div>
            <div class="icon">
                <i class="ri-shopping-bag-line"></i>
            </div>
        </nav>
        <section>
            <div class="product-card">
                <div class="img">
                    <img src="https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?q=80&w=1469&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
                </div>
                <div class="content">
                    <h3>Name:</h3>
                    <h3>Category:</h3>
                    <h3>Price:</h3>
                </div>
        
                <div class="btns">
                    <button>Remove</button>
                    <button>Add to Cart</button>
                </div>
            </div>
    
        </section>
    </main>

</body>
</html>
